name: Test dotfiles

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install test tools
        run: |
          brew install chezmoi jq shellcheck
          npm install --global --prefix "$HOME/.local" @openai/codex
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run local checks
        run: make check
      - name: Run macOS tests
        run: make test-macos

  linux:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck zsh
          curl -fsLS https://get.chezmoi.io -o /tmp/install-chezmoi.sh
          sh /tmp/install-chezmoi.sh -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run local and Ubuntu tests
        run: make test
      - name: Run Codespaces tests
        run: CODESPACES=true make test-linux
