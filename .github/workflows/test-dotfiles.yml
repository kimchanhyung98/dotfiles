name: Test dotfiles

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install test tools
        run: |
          brew install chezmoi jq shellcheck
          curl -fsSL https://chatgpt.com/codex/install.sh | CODEX_NON_INTERACTIVE=1 sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run local checks
        run: make check
      - name: Run macOS tests
        run: make test-macos

  linux:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq nodejs shellcheck zsh
          curl -fsLS https://get.chezmoi.io -o /tmp/install-chezmoi.sh
          sh /tmp/install-chezmoi.sh -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run local and Ubuntu tests
        run: make test
      - name: Run container tests
        run: |
          docker build -q -t dotfiles-test -f tests/linux/Dockerfile .
          docker run --rm dotfiles-test
          docker run --rm -e CODESPACES=true dotfiles-test \
            bash /home/testuser/tests/run.sh codespaces
